<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15120c"/>
      <stop offset="100%" stop-color="#0a0805"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c4923a"/>
      <stop offset="100%" stop-color="#e8b955"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- § mark -->
  <text x="80" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="700" fill="url(#gold)">§</text>
  <!-- SigRank wordmark -->
  <text x="80" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#f5f0e8">SigRank</text>
  <!-- Tagline -->
  <text x="80" y="400" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#a89a7a">The AI operator leaderboard.</text>
  <text x="80" y="440" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#a89a7a">Privacy-preserving. Token-telemetry. Cascade-ranked.</text>
  <!-- Υ formula -->
  <text x="80" y="540" font-family="Georgia, 'Times New Roman', serif" font-size="36" fill="#c4923a">Υ = (cache_read × output) / input²</text>
  <!-- signalaf.com -->
  <text x="80" y="600" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#6b6354">signalaf.com</text>
</svg>
