<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15120c"/>
      <stop offset="100%" stop-color="#0a0805"/>
    </linearGradient>
    <linearGradient id="wm" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#e6a3c8"/>
      <stop offset="22%" stop-color="#e8924a"/>
      <stop offset="55%" stop-color="#e8b955"/>
      <stop offset="100%" stop-color="#f0d28a"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- faint cascade streaks (echo the hero's animated lines) -->
  <g opacity="0.22" stroke-width="3" fill="none">
    <line x1="0" y1="180" x2="1280" y2="120" stroke="#c4923a"/>
    <line x1="0" y1="470" x2="1280" y2="540" stroke="#2dd4a0"/>
    <line x1="0" y1="540" x2="1280" y2="430" stroke="#c4923a"/>
  </g>

  <!-- eyebrow -->
  <text x="640" y="125" text-anchor="middle" font-size="28" font-weight="700"
        letter-spacing="10" fill="#2dd4a0">OPERATOR PERFORMANCE SIGNATURE</text>

  <!-- SIGRANK wordmark as terminal block-art -->
  <g font-family="'Courier New', Courier, monospace" font-size="34" font-weight="700"
     letter-spacing="0" fill="url(#wm)" text-anchor="middle" xml:space="preserve">
    <text x="640" y="225">███████ ██  ██████  ██████   █████  ███    ██  ██   ██</text>
    <text x="640" y="261">██      ██ ██       ██   ██ ██   ██ ████   ██  ██  ██ </text>
    <text x="640" y="297">███████ ██ ██   ███ ██████  ███████ ██ ██  ██  █████  </text>
    <text x="640" y="333">     ██ ██ ██    ██ ██   ██ ██   ██ ██  ██ ██  ██  ██ </text>
    <text x="640" y="369">███████ ██  ██████  ██   ██ ██   ██ ██   ████  ██   ██</text>
  </g>

  <!-- divider + sub -->
  <text x="640" y="435" text-anchor="middle" font-size="25" fill="#9e937c">— For all builders, burners and 10×ers —</text>

  <!-- descriptive line -->
  <text x="640" y="510" text-anchor="middle" font-size="32" font-weight="600" fill="#e9e3d5">The new standard in AI evaluation &amp; benchmarks.</text>
  <text x="640" y="555" text-anchor="middle" font-size="27" fill="#c4baa5">Is your signal compounding, or are tokens burned?</text>

  <!-- footer: formula + url -->
  <text x="90" y="610" font-family="Georgia, 'Times New Roman', serif" font-size="25" fill="#c4923a">Υ = (cache_read × output) / input²</text>
  <text x="1190" y="610" text-anchor="end" font-size="23" fill="#6b6354">signalaf.com</text>
</svg>
