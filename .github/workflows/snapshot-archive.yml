name: Snapshot Archive

# Every 5 days: tag the current state as a rollback point.
# Vercel handles deploys from main — this tag is just a marker so you can
# `git checkout <tag>` or compare diffs between snapshots.
#
# Schedule: runs on the 1st, 6th, 11th, 16th, 21st, 26th of each month at 00:00 UTC.
# Also runnable manually via workflow_dispatch.

on:
  schedule:
    - cron: '0 0 1,6,11,16,21,26 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DATE=$(date -u +%Y-%m-%d)
          TAG="snapshot-${DATE}-v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Snapshot ${{ steps.version.outputs.date }} (v${{ steps.version.outputs.version }})"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Snapshot ${{ steps.version.outputs.date }} (v${{ steps.version.outputs.version }})" \
            --notes "Automated 5-day snapshot. Version: v${{ steps.version.outputs.version }}.

          Rollback:
          - Git: \`git checkout ${{ steps.version.outputs.tag }}\`
          - Vercel: redeploy from this tag (or rollback via Vercel dashboard)"
